<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Sayang! ❤️</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(to bottom, #1a1c29, #2d1b2e);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      color: #ffffff;
      text-align: center;
      position: relative;
    }
    .card {
      background: rgba(255, 255, 255, 0.1);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      max-width: 420px;
      width: 90%;
      z-index: 10;
      animation: fadeIn 1.2s ease-in-out;
    }
    .foto-container {
      width: 150px;
      height: 150px;
      margin: 0 auto 20px;
      border-radius: 50%;
      border: 4px solid #ff4757;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(255, 71, 87, 0.6);
      position: relative;
      background: rgba(255,255,255,0.08);
    }
    .foto-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      top: 0;
      left: 0;
      opacity: 0;
      transition: opacity 1s ease-in-out;
    }
    .foto-container img.active { opacity: 1; }
    h1 {
      font-size: 1.8rem;
      color: #ff4757;
      margin-bottom: 15px;
      text-shadow: 0 0 10px rgba(255, 71, 87, 0.5);
    }
    .card p {
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 18px;
      color: #f1f2f6;
    }
    .music-btn {
      background: #ff4757;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 700;
      box-shadow: 0 6px 18px rgba(255, 71, 87, 0.35);
      transition: transform 0.2s ease, opacity 0.2s ease;
      margin-bottom: 10px;
    }
    .music-btn:hover { transform: scale(1.03); }
    .status {
      font-size: 0.9rem;
      color: #ffdede;
      margin-bottom: 10px;
      min-height: 20px;
    }
    .rain-text {
      position: absolute;
      top: -50px;
      color: rgba(255, 182, 193, 0.75);
      font-size: 14px;
      font-weight: bold;
      white-space: nowrap;
      user-select: none;
      pointer-events: none;
      z-index: 1;
      animation: rain linear forwards;
    }
    @keyframes rain { to { transform: translateY(110vh); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <div class="card">
    <div class="foto-container" id="slideshow-container"></div>
    <h1>Happy Birthday, Sayang! 💖</h1>
    <p>Selamat ulang tahun! Makasih banyak ya udah nemenin hari-hariku sampai sekarang. Semoga kamu panjang umur, sehat selalu, dan dilancarkan segala urusannya. I love you today, tomorrow, and forever! 🥰✨</p>

    <button class="music-btn" id="playMusicBtn">🎵 Putar Musik</button>
    <div class="status" id="musicStatus">Musik belum diputar.</div>

    <audio id="bgMusic" preload="auto" loop playsinline>
      <source src="./until-i-found-you.mp3" type="audio/mpeg">
    </audio>
  </div>

  <script>
    const kataKata = ["HBD Sayang ❤️", "I Love You", "Sehat Selalu ya ✨", "Bahagia Terus 🥰", "Happy Birthday 🎉", "Miss You", "Selalu Bersamaku 🫂", "Kamu Berharga 💎", "Wish You All The Best 🎂"];
    function buatHujanTeks() {
      const el = document.createElement('div');
      el.className = 'rain-text';
      el.innerText = kataKata[Math.floor(Math.random() * kataKata.length)];
      el.style.left = Math.random() * 100 + 'vw';
      const durasi = Math.random() * 3 + 3;
      el.style.animationDuration = durasi + 's';
      el.style.fontSize = Math.random() * 6 + 12 + 'px';
      el.style.opacity = Math.random() * 0.5 + 0.4;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), durasi * 1000);
    }
    setInterval(buatHujanTeks, 200);

    const repoUser = "dang010-collab";
    const repoName = "Ultah-sayangg-";
    fetch(`https://api.github.com/repos/${repoUser}/${repoName}/contents`)
      .then(res => res.json())
      .then(data => {
        const fotoFiles = data.filter(file => file.name.startsWith("IMG-") && file.name.match(/\.(jpg|jpeg|png|webp)$/i));
        const container = document.getElementById('slideshow-container');
        fotoFiles.forEach((file, index) => {
          const img = document.createElement('img');
          img.src = file.download_url;
          img.alt = "Foto";
          if (index === 0) img.classList.add('active');
          container.appendChild(img);
        });

        const images = container.getElementsByTagName('img');
        let currentIndex = 0;
        if (images.length > 1) {
          setInterval(() => {
            images[currentIndex].classList.remove('active');
            currentIndex = (currentIndex + 1) % images.length;
            images[currentIndex].classList.add('active');
          }, 3000);
        }
      })
      .catch(err => console.log(err));

    const btn = document.getElementById('playMusicBtn');
    const audio = document.getElementById('bgMusic');
    const status = document.getElementById('musicStatus');

    btn.addEventListener('click', async () => {
      try {
        audio.pause();
        audio.currentTime = 0;
        audio.load();
        audio.muted = false;
        audio.volume = 1;
        await audio.play();
        status.textContent = "Musik sedang diputar 🎶";
        btn.textContent = "Musik Sedang Diputar";
        btn.disabled = true;
        btn.style.opacity = 0.75;
      } catch (err) {
        console.error(err);
        status.textContent = "Gagal memutar. Pastikan file MP3 ada dan namanya sama persis.";
      }
    });
  </script>
</body>
</html>
