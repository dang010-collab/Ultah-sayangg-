<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Sayang! ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Background gelap estetik malam hari biar efek hujan teksnya kontras */
            background: linear-gradient(to bottom, #1a1c29, #2d1b2e);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #ffffff;
            text-align: center;
            position: relative;
        }

        /* Kartu Utama di Tengah */
        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 400px;
            width: 90%;
            z-index: 10;
            animation: fadeIn 1.5s ease-in-out;
        }
        .foto-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            border-radius: 50%;
            border: 3px solid #ff4757;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(255, 71, 87, 0.5);
        }
        .foto-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        h1 {
            font-size: 1.8rem;
            color: #ff4757;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(255, 71, 87, 0.5);
        }
        .card p {
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 25px;
            color: #f1f2f6;
        }
        .btn-musik {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 0.9rem;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
        }
        .btn-musik:hover {
            background-color: #e84118;
            transform: scale(1.05);
        }

        /* Gaya untuk Hujan Teks */
        .rain-text {
            position: absolute;
            top: -50px;
            color: rgba(255, 182, 193, 0.75); /* Warna pink soft transparan */
            font-size: 14px;
            font-weight: bold;
            white-space: nowrap;
            user-select: none;
            pointer-events: none;
            z-index: 1;
            animation: rain linear forwards;
        }

        @keyframes rain {
            to {
                transform: translateY(110vh);
            }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
    </audio>

    <div class="card">
        <div class="foto-container">
            <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=400" alt="Foto Cantik">
        </div>
        
        <h1>Happy Birthday, Sayang! 💖</h1>
        <p>
            Selamat ulang tahun! Makasih banyak ya udah nemenin hari-hariku sampai sekarang. 
            Semoga kamu panjang umur, sehat selalu, dan dilancarkan segala urusannya. 
            I love you today, tomorrow, and forever! 🥰✨
        </p>
        
        <button class="btn-musik" onclick="toggleMusik()">🎵 Putar Musik</button>
    </div>

    <script>
        // Fungsi On/Off Musik
        const musik = document.getElementById('bg-music');
        function toggleMusik() {
            if (musik.paused) {
                musik.play();
                document.querySelector('.btn-musik').innerText = "⏸️ Jeda Musik";
            } else {
                musik.pause();
                document.querySelector('.btn-musik').innerText = "🎵 Putar Musik";
            }
        }

        // KUMPULAN KATA-KATA UNTUK HUJAN TEKS (Bisa kamu tambah / edit di dalam tanda petik)
        const kataKata = [
            "HBD Sayang ❤️", 
            "I Love You", 
            "Sehat Selalu ya ✨", 
            "Bahagia Terus 🥰", 
            "Happy Birthday 🎉", 
            "Miss You", 
            "Selalu Bersamaku 🫂", 
            "Kamu Berharga 💎", 
            "Wish You All The Best 🎂"
        ];

        // Fungsi membuat rintik hujan teks
        function buatHujanTeks() {
            const elemen = document.createElement('div');
            elemen.classList.add('rain-text');
            
            // Pilih kata acak dari list di atas
            const teksAcak = kataKata[Math.floor(Math.random() * kataKata.length)];
            elemen.innerText = teksAcak;
            
            // Atur posisi kiri acak dan kecepatan jatuh acak
            elemen.style.left = Math.random() * 100 + 'vw';
            
            // Kecepatan jatuh (antara 3 sampai 6 detik)
            const durasi = Math.random() * 3 + 3;
            elemen.style.animationDuration = durasi + 's';
            
            // Ukuran teks dan opasitas acak biar makin estetik alami
            elemen.style.fontSize = Math.random() * 6 + 12 + 'px'; 
            elemen.style.opacity = Math.random() * 0.5 + 0.4; 

            document.body.appendChild(elemen);
            
            // Hapus elemen kalau sudah sampai bawah biar web nggak lemot
            setTimeout(() => {
                elemen.remove();
            }, durasi * 1000);
        }

        // Kecepatan rintik hujan (makin kecil angkanya, makin lebat hujannya)
        setInterval(buatHujanTeks, 200);
    </script>
</body>
</html>
